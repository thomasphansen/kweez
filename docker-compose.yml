services:
  postgres:
    image: postgres:16-alpine
    container_name: kweez-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kweez}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kweez_secret}
      POSTGRES_DB: ${POSTGRES_DB:-kweez}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kweez}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kweez-backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB:-kweez};Username=${POSTGRES_USER:-kweez};Password=${POSTGRES_PASSWORD:-kweez_secret}
      - AllowedOrigins=${ALLOWED_ORIGINS:-http://localhost:3000}
      - Google__ClientId=${GOOGLE_CLIENT_ID}
      - Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - Auth__AdminEmail=${AUTH_ADMIN_EMAIL:-thomasphansen@gmail.com}
      - FrontendUrl=${FRONTEND_URL:-http://localhost:3000}
      - DeepL__ApiKey=${DEEPL_API_KEY:-}
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
    container_name: kweez-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
